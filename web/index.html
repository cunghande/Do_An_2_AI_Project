<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeqRec Pro - AI Product Recommendation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="sticky top-0 z-50 glass border-b border-slate-200 px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded-lg text-white">
                <i data-lucide="cpu"></i>
            </div>
            <span class="text-xl font-bold tracking-tight text-blue-900">Đồ Án 2: SeqRec <span class="text-blue-500 text-sm font-normal">v1.0</span></span>
        </div>
        <div class="flex items-center gap-4">
            <div id="api-status" class="flex items-center gap-2 text-xs font-medium px-3 py-1 rounded-full bg-red-100 text-red-600">
                <span id="status-dot" class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                </span>
                <span id="status-text">API Offline</span>
            </div>
            <div class="flex items-center gap-2 border-l pl-4">
                <img src="https://ui-avatars.com/api/?name=Admin+User&background=0D8ABC&color=fff" class="w-8 h-8 rounded-full border">
                <span class="text-sm font-semibold">Cung Đỗ</span>
            </div>
        </div>
    </nav>

    <div class="max-w-[1400px] mx-auto p-6 grid grid-cols-12 gap-6">
        <aside class="col-span-12 lg:col-span-3 space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-4 flex items-center gap-2">
                    <i data-lucide="user-check" class="w-4 h-4"></i> Session Control
                </h3>
                <div class="space-y-3">
                    <label class="block text-xs font-medium text-slate-500">Nhập User ID (VD: 1, 10, 100)</label>
                    <input id="userIdInput" type="number" placeholder="User ID..." class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition">
                    <button onclick="loadUserHistory()" class="w-full bg-slate-900 text-white py-3 rounded-xl text-sm font-semibold hover:bg-slate-800 transition shadow-lg">Đăng nhập</button>
                    <div id="demo-hints" class="text-[10px] text-slate-400 mt-2 italic">Gợi ý: Thử User ID 1 hoặc 10</div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-4 flex items-center gap-2">
                    <i data-lucide="clock" class="w-4 h-4"></i> User Journey
                </h3>
                <div id="timeline" class="space-y-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar text-center text-slate-400 py-4 italic text-xs">
                    Đang tải hành vi...
                </div>
                <div class="mt-4 pt-4 border-t">
                    <input id="addItemInput" type="number" placeholder="Nhập ID sản phẩm..." class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm mb-2 outline-none">
                    <button onclick="addNewItem()" class="w-full bg-blue-50 text-blue-600 py-2 rounded-lg text-xs font-bold hover:bg-blue-100 transition uppercase tracking-widest">+ Thêm vào chuỗi</button>
                </div>
            </div>
        </aside>

        <main class="col-span-12 lg:col-span-9 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-blue-600 text-white p-5 rounded-2xl shadow-lg">
                    <p class="text-blue-100 text-xs font-medium uppercase italic">Model Architecture</p>
                    <h4 class="text-2xl font-bold">GRU4Rec</h4>
                    <p class="text-[10px] mt-2 opacity-80 italic">Capture Temporal Patterns</p>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <p class="text-slate-400 text-xs font-medium uppercase">Performance HR@10</p>
                    <h4 id="hr-metric" class="text-2xl font-bold text-slate-800">--</h4>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full mt-2"><div class="bg-green-500 h-1.5 rounded-full w-[19%]"></div></div>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <p class="text-slate-400 text-xs font-medium uppercase">NDCG@10</p>
                    <h4 id="ndcg-metric" class="text-2xl font-bold text-slate-800">--</h4>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full mt-2"><div class="bg-blue-500 h-1.5 rounded-full w-[12%]"></div></div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 min-h-[500px]">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold flex items-center gap-2">
                        <i data-lucide="sparkles" class="text-orange-400"></i> Được gợi ý cho bạn
                    </h2>
                    <span class="text-[10px] font-bold bg-green-50 text-green-600 px-3 py-1 rounded-full border border-green-100 uppercase tracking-tighter">Real-time Inference</span>
                </div>
                
                <div id="recommendation-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6"></div>
                <div id="loader" class="hidden py-20 text-center">
                    <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mb-4"></div>
                    <p class="text-slate-400 animate-pulse text-sm font-medium">Model đang tính toán Hidden State...</p>
                </div>
            </div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/50 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white max-w-lg w-full rounded-3xl p-8 relative shadow-2xl animate-in fade-in zoom-in duration-300">
            <button onclick="closeModal()" class="absolute top-4 right-4 p-2 hover:bg-slate-100 rounded-full transition"><i data-lucide="x"></i></button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
