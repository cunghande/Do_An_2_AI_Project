<!DOCTYPE html>
<html>
<head>
    <title>Demo Đồ Án 2 - Sequential Rec</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-10">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold text-blue-800 mb-2">Hệ Thống Gợi Ý Sản Phẩm Theo Chuỗi</h1>
        <p class="mb-8 text-gray-600">Mô hình: <span class="font-mono bg-blue-100 px-2 py-1 rounded text-blue-700">GRU4Rec</span> | Trạng thái: <span class="text-green-600 font-bold">Online</span></p>

        <div class="grid grid-cols-3 gap-8">
            <div class="col-span-1 bg-white p-6 rounded-xl shadow-sm border">
                <h2 class="font-bold mb-4 flex items-center">🕒 Lịch sử xem (Sequence)</h2>
                <div id="history" class="space-y-2 mb-4">
                    </div>
                <input id="itemId" type="number" placeholder="Nhập ID (1-26354)" class="w-full border p-2 rounded-lg mb-2">
                <button onclick="addItem()" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Thêm vào chuỗi</button>
            </div>

            <div class="col-span-2 bg-white p-6 rounded-xl shadow-sm border">
                <h2 class="font-bold mb-4 text-green-700">✨ Gợi ý tiếp theo (Top-10)</h2>
                <div id="recs" class="grid grid-cols-2 gap-4 text-sm text-center">
                    <p class="text-gray-400 col-span-2 py-10">Thêm sản phẩm vào lịch sử để xem gợi ý...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sequence = [105, 22]; // Lịch sử mặc định để test

        async function getRecs() {
            if (sequence.length === 0) return;
            const res = await fetch('http://127.0.0.1:8000/recommend', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ sequence_history: sequence, top_k: 6 })
            });
            const data = await res.json();
            renderRecs(data.recommendations);
        }

        function renderRecs(items) {
            const container = document.getElementById('recs');
            container.innerHTML = items.map(item => `
                <div class="border p-3 rounded-lg hover:border-blue-500 transition shadow-sm">
                    <img src="${item.img_url}" class="h-32 mx-auto mb-2 object-contain" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                    <div class="font-bold truncate">${item.title}</div>
                    <div class="text-blue-600 font-mono text-xs mt-1">Score: ${item.score}</div>
                </div>
            `).join('');
        }

        function renderHistory() {
            const container = document.getElementById('history');
            container.innerHTML = sequence.map((id, idx) => `
                <div class="flex justify-between bg-gray-50 p-2 rounded border border-dashed">
                    <span class="font-mono text-sm">ID: ${id}</span>
                    <button onclick="remove(${idx})" class="text-red-400 text-xs">Xóa</button>
                </div>
            `).join('');
            getRecs();
        }

        function addItem() {
            const id = parseInt(document.getElementById('itemId').value);
            if (id > 0 && id <= 26354) {
                sequence.push(id);
                renderHistory();
            } else { alert("Vui lòng nhập ID hợp lệ (1-26354)"); }
        }

        function remove(idx) {
            sequence.splice(idx, 1);
            renderHistory();
        }

        renderHistory(); // Khởi chạy lần đầu
    </script>
</body>
</html>
